{% extends "base.html" %}
{% block content %}
<section class="settings">
  <header class="settings-head">
    <p class="eyebrow">Account</p>
    <h1>Change your password</h1>
    <p class="muted">Signed in as <strong>{{ user.username }}</strong>{% if user.is_admin %} · admin{% endif %}.</p>
  </header>
  {% if saved %}<div class="notice">Password updated.</div>{% endif %}
  {% if error %}<div class="alert">{{ error }}</div>{% endif %}
  <form method="post" action="/account/password" class="settings-grid" data-loading-form>
    <section class="settings-section">
      <label>
        Current password
        <input name="current_password" type="password" autocomplete="current-password" required>
      </label>
      <label>
        New password <span class="muted">(at least 6 characters)</span>
        <input name="new_password" type="password" autocomplete="new-password" minlength="6" required>
      </label>
      <label>
        Confirm new password
        <input name="confirm_password" type="password" autocomplete="new-password" minlength="6" required>
      </label>
    </section>
    <div class="settings-foot">
      <button type="submit" data-loading-text="Saving...">Update password</button>
      <a href="/notebooks" class="ghost">Back to notebooks</a>
    </div>
  </form>
</section>
{% endblock %}
